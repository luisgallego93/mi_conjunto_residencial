{% extends 'base.html' %}

{% block title %}Iniciar Sesión - Mi Conjunto Gestión{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px; border-radius: 10px; border: none;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Mi Conjunto</h2>
                <p class="text-muted">Gestión de Conjuntos Residenciales</p>
            </div>
            
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" id="id_username" placeholder="Tu usuario" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" id="id_password" placeholder="Tu contraseña" required>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger p-2 mb-3 rounded" style="font-size: 0.9rem;">
                    Usuario o contraseña incorrectos. Por favor, intente de nuevo.
                </div>
                {% endif %}
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary py-2 fw-semibold">Ingresar al Sistema</button>
                </div>
                <input type="hidden" name="next" value="{{ next|default:'' }}">
            </form>
        </div>
    </div>
</div>
{% endblock %}
